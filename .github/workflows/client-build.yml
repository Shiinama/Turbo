name: Build Client

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'client/**'
      - 'build/**'
      - '.github/workflows/client-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'build/**'
      - '.github/workflows/client-build.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload assets to
        required: false
        type: string

permissions:
  contents: write

jobs:
  package-client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            goos: windows
            goarch: amd64
            asset_name: Turbo-windows-amd64.zip
          - os: macos-13
            target: macos
            goos: darwin
            goarch: amd64
            asset_name: Turbo-macos-amd64.zip
          - os: macos-latest
            target: macos
            goos: darwin
            goarch: arm64
            asset_name: Turbo-macos-arm64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum

      - name: Build Windows package
        if: matrix.target == 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist/windows
          go build -C client -trimpath -ldflags="-s -w -H=windowsgui" -o ../dist/windows/Turbo.exe .
          (cd dist/windows && 7z a -tzip "../${{ matrix.asset_name }}" Turbo.exe)

      - name: Build macOS package
        if: matrix.target == 'macos'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          mkdir -p dist/macos/Turbo.app/Contents/MacOS
          mkdir -p dist/macos/Turbo.app/Contents/Resources
          go build -C client -trimpath -ldflags="-s -w" -o ../dist/macos/Turbo.app/Contents/MacOS/Turbo .
          cp build/Turbo.app/Contents/Info.plist dist/macos/Turbo.app/Contents/Info.plist
          cp build/assets/icon.icns dist/macos/Turbo.app/Contents/Resources/icon.icns
          chmod +x dist/macos/Turbo.app/Contents/MacOS/Turbo
          ditto -c -k --keepParent dist/macos/Turbo.app "dist/${{ matrix.asset_name }}"

      - name: Create checksum
        shell: bash
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"
          else
            certutil -hashfile "dist/${{ matrix.asset_name }}" SHA256 \
              | sed -n '2p' \
              | awk '{print $1 "  dist/${{ matrix.asset_name }}"}' \
              > "dist/${{ matrix.asset_name }}.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
