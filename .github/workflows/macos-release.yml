name: macOS Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload macOS assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            goarch: amd64
            asset_name: Turbo-macos-amd64.zip
          - runner: macos-latest
            goarch: arm64
            asset_name: Turbo-macos-arm64.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum

      - name: Build app bundle
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          rm -rf dist/macos build/release-macos
          mkdir -p dist/macos/Turbo.app/Contents/MacOS
          mkdir -p dist/macos/Turbo.app/Contents/Resources

          go build -C client -trimpath -ldflags="-s -w" -o ../dist/macos/Turbo.app/Contents/MacOS/Turbo .

          cp build/Turbo.app/Contents/Info.plist dist/macos/Turbo.app/Contents/Info.plist
          cp build/assets/icon.icns dist/macos/Turbo.app/Contents/Resources/icon.icns
          chmod +x dist/macos/Turbo.app/Contents/MacOS/Turbo

          ditto -c -k --keepParent dist/macos/Turbo.app "dist/${{ matrix.asset_name }}"
          shasum -a 256 "dist/${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
