services:
  app:
    build: .
    container_name: turbo-server
    ports:
      - "1080:1080" # SOCKS5
      - "8080:8080" # admin and websocket node endpoint
      - "8443:8443" # raw TCP node endpoint for local testing
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/turbo?sslmode=disable
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - PROXY_PUBLIC_HOST=localhost
      - PROXY_PUBLIC_PORT=1080
      - TURBO_NODE_URL=ws://localhost:8080/node
      - HTTP_PORT=8080
      - SOCKS_PORT=1080
      - NODE_PORT=8443
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: turbo-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=turbo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
